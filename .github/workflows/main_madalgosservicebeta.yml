name: Deploy MADAlgos (Beta)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: madalgos-beta-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGODB_DB_NAME: ${{ secrets.MONGODB_DB_NAME }}

          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          SUPERADMIN_EMAIL: ${{ secrets.SUPERADMIN_EMAIL }}
          SUPERADMIN_PASSWORD: ${{ secrets.SUPERADMIN_PASSWORD }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          # Optional alias used by /api/contact — same key as SENDGRID_API_KEY if you only store one
          SendGridDevKey: ${{ secrets.SendGridDevKey }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          SENDGRID_EMAIL_VERIFICATION_TEMPLATE_ID: ${{ secrets.SENDGRID_EMAIL_VERIFICATION_TEMPLATE_ID }}
          SENDGRID_MENTOR_APPLY_TEMPLATE_ID: ${{ secrets.SENDGRID_MENTOR_APPLY_TEMPLATE_ID }}
          SENDGRID_MENTOR_ACCEPTED_TEMPLATE_ID: ${{ secrets.SENDGRID_MENTOR_ACCEPTED_TEMPLATE_ID }}
          SENDGRID_MENTOR_PROFILE_SUBMITTED_TEMPLATE_ID: ${{ secrets.SENDGRID_MENTOR_PROFILE_SUBMITTED_TEMPLATE_ID }}
          SENDGRID_MENTOR_PROFILE_LIVE_TEMPLATE_ID: ${{ secrets.SENDGRID_MENTOR_PROFILE_LIVE_TEMPLATE_ID }}
          MENTOR_APPLY_NOTIFY_EMAIL: ${{ secrets.MENTOR_APPLY_NOTIFY_EMAIL }}
          CONTACT_TEAM_EMAIL: ${{ secrets.CONTACT_TEAM_EMAIL }}
          NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}
          RECAPTCHA_SECRET_KEY: ${{ secrets.RECAPTCHA_SECRET_KEY }}
          NEXT_PUBLIC_BROCHURE_URL: ${{ secrets.NEXT_PUBLIC_BROCHURE_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.NEXT_PUBLIC_AZURE_STORAGE_CONNECTION_STRING }}
          NEXT_PUBLIC_ACCOUNT_NAME: ${{ secrets.NEXT_PUBLIC_ACCOUNT_NAME }}
          SENDGRID_ASSESSMENT_DISPATCH_TEMPLATE_ID: ${{ secrets.SENDGRID_ASSESSMENT_DISPATCH_TEMPLATE_ID }}
          JUDGE0_API_URL: ${{ secrets.JUDGE0_API_URL }}
          JUDGE0_API_KEY: ${{ secrets.JUDGE0_API_KEY }}

          NEXT_TELEMETRY_DISABLED: "1"
          NODE_ENV: production

      - name: Prepare deployment folder
        run: |
          mkdir -p deploy
          cp -r .next/standalone/. deploy/
          rm -rf deploy/.next
          cp -r .next deploy/.next
          rm -rf deploy/.next/standalone
          cp -r .next/static/. deploy/.next/static/
          cp -r public deploy/public

      - name: Zip deployment
        run: cd deploy && zip -r ../deploy.zip . -x "*.map"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: deploy.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: MADAlgosServiceBeta
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_910D565C0A3740E6BE5368FDC6F579A5 }}
          package: deploy.zip